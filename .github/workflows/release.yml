name: Release
run-name: "Release: ${{ inputs.newversion }}"

on:
  workflow_dispatch:
    inputs:
      newversion:
        type: choice
        options:
          - patch
          - minor
          - major
        description: New version
        default: patch
        required: true

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/nodejs.yml
    permissions:
      contents: read

  build:
    runs-on: ubuntu-latest
    env:
      NEW_VERSION_TYPE: ${{ inputs.newversion }}
    outputs:
      new_tag: ${{ steps.bump_version.outputs.new_tag }}
      previous_tag: ${{ steps.get_latest_tag.outputs.latest_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get latest tag
        id: get_latest_tag
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"

      - name: Bump version
        id: bump_version
        env:
          LATEST_TAG: ${{ steps.get_latest_tag.outputs.latest_tag }}
        run: |
          # Set version to latest tag first, then bump (npm version works relative to current)
          npm version "$LATEST_TAG" --no-git-tag-version --allow-same-version
          npm version "$NEW_VERSION_TYPE" --no-git-tag-version

          new_version=$(node -p "require('./package.json').version")
          new_tag="v${new_version}"

          echo "Created new tag: ${new_tag}"
          echo "new_tag=${new_tag}" >> "$GITHUB_OUTPUT"

      - name: Build package
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            dist
            package.json
            package-lock.json

  publish:
    needs: [ci, build]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write
    env:
      NEW_TAG: ${{ needs.build.outputs.new_tag }}
      PREVIOUS_TAG: ${{ needs.build.outputs.previous_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Push version update
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${NEW_TAG}"
          git push origin "HEAD:${DEFAULT_BRANCH}"

      - name: Push version tag
        run: |
          git tag "${NEW_TAG}"
          git push origin "${NEW_TAG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$NEW_TAG" --generate-notes --notes-start-tag "$PREVIOUS_TAG"
