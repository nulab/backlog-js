name: Release
run-name: "Release: ${{ inputs.newversion }}${{ inputs.dry_run && ' (dry-run)' || '' }}"

on:
  workflow_dispatch:
    inputs:
      newversion:
        type: choice
        options:
          - patch
          - minor
          - major
        description: New version
        default: patch
        required: true
      dry_run:
        type: boolean
        description: Dry run (skip publish, tag, and release)
        default: true

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/nodejs.yml
    permissions:
      contents: read

  build:
    runs-on: ubuntu-latest
    env:
      NEW_VERSION_TYPE: ${{ inputs.newversion }}
    outputs:
      new_tag: ${{ steps.bump_version.outputs.new_tag }}
      previous_tag: ${{ steps.get_latest_tag.outputs.latest_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get latest tag
        id: get_latest_tag
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"

      - name: Bump version
        id: bump_version
        env:
          LATEST_TAG: ${{ steps.get_latest_tag.outputs.latest_tag }}
        run: |
          # Set version to latest tag first, then bump (npm version works relative to current)
          npm version "$LATEST_TAG" --no-git-tag-version --allow-same-version
          npm version "$NEW_VERSION_TYPE" --no-git-tag-version

          new_version=$(node -p "require('./package.json').version")
          new_tag="v${new_version}"

          echo "Created new tag: ${new_tag}"
          echo "new_tag=${new_tag}" >> "$GITHUB_OUTPUT"

      - name: Build package
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            dist
            package.json

  publish:
    needs: [ci, build]
    runs-on: ubuntu-latest
    environment: ${{ !inputs.dry_run && 'production' || '' }}
    permissions:
      contents: write
      id-token: write
    env:
      NEW_TAG: ${{ needs.build.outputs.new_tag }}
      PREVIOUS_TAG: ${{ needs.build.outputs.previous_tag }}
      DRY_RUN: ${{ inputs.dry_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build

      - name: Publish to npm
        run: |
          flags="--provenance --access public --no-git-checks"
          if [ "$DRY_RUN" = "true" ]; then
            flags="$flags --dry-run"
          fi
          npm publish $flags

      - name: Push version tag
        if: ${{ !inputs.dry_run }}
        run: |
          git tag "${NEW_TAG}"
          git push origin "${NEW_TAG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          TARGET_COMMITISH: ${{ github.sha }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "## Release notes for ${NEW_TAG}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            gh api "repos/${REPOSITORY}/releases/generate-notes" \
              -f tag_name="$NEW_TAG" \
              -f target_commitish="$TARGET_COMMITISH" \
              -f previous_tag_name="$PREVIOUS_TAG" \
              --jq '.body' >> "$GITHUB_STEP_SUMMARY"
          else
            gh release create "$NEW_TAG" --generate-notes --notes-start-tag "$PREVIOUS_TAG"
          fi
